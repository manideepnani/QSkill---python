<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        textarea {
            width: 60%;
            height: 120px;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🧠 Sentiment Analysis Tool</h1>

    <form method="POST">
        <textarea name="text" placeholder="Enter your text here...">{{ text }}</textarea><br>
        <button type="submit">Analyze</button>
    </form>

    {% if sentiment %}
    <div class="result">
        <h2>Result:</h2>
        <p><b>Sentiment:</b> {{ sentiment }}</p>
        <p><b>Polarity:</b> {{ polarity }}</p>
        <p><b>Subjectivity:</b> {{ subjectivity }}</p>
    </div>
    {% endif %}

</body>
</html>
